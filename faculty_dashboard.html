<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Dashboard</title>
  <style>
    :root { --bg:#f5f2eb; --card:#fff; --ink:#1d1e22; --muted:#68738b; --brand:#0f766e; --line:#e5e0d5; --danger:#b42334; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; color:var(--ink); background:linear-gradient(180deg,#f8f5ef,var(--bg)); }
    .wrap { max-width:1180px; margin:0 auto; padding:20px; }
    .hero { border-radius:16px; color:#fff; background:linear-gradient(125deg,#173f5f,#20639b,#3caea3); padding:18px; }
    .hero-row { display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; align-items:center; }
    .pill { padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.3); font-size:.9rem; }
    .grid { display:grid; grid-template-columns:1.4fr 1fr; gap:14px; margin-top:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .row { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; align-items:center; }
    input, select { border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    button, .btn-link { border:0; border-radius:8px; padding:9px 12px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .btn-main { background:var(--brand); color:#fff; }
    .btn-soft { background:#edf4f3; color:#123; border:1px solid #d8e7e4; }
    .btn-danger { background:#fff3f4; color:var(--danger); border:1px solid #ffd7dc; }
    .status { margin-top:10px; border:1px solid #d8e7e4; background:#f4fbfa; border-radius:8px; padding:10px; min-height:42px; color:#124; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat { border:1px solid var(--line); border-radius:10px; padding:8px; background:#fcfaf5; }
    .stat .label { color:var(--muted); font-size:.86rem; }
    .stat .value { font-size:1.2rem; font-weight:700; }
    table { width:100%; border-collapse:collapse; margin-top:10px; font-size:.92rem; }
    th, td { border-bottom:1px solid var(--line); padding:7px; text-align:left; }
    th { color:var(--muted); }
    video { width:100%; border:1px solid var(--line); border-radius:10px; min-height:220px; object-fit:cover; background:#f4f4f4; }
    .muted { color:var(--muted); }
    @media (max-width:920px) { .grid { grid-template-columns:1fr; } .wrap { padding:12px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-row">
        <div>
          <h1 style="margin:0;">Faculty Dashboard</h1>
          <p style="margin:6px 0 0; color:rgba(255,255,255,.92);">Select semester/subject and mark attendance.</p>
        </div>
        <div class="row" style="margin-top:0;">
          <span class="pill">User: {{ user }} | Role: {{ role }}</span>
          <button class="btn-danger" id="logoutBtn" type="button">Logout</button>
        </div>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2 style="margin:0;">Take Attendance</h2>
        <div class="row">
          <select id="facultySemester"></select>
          <select id="facultySubject"></select>
          <button class="btn-main" id="setContextBtn" type="button">Start Attendance</button>
        </div>
        <p class="muted" id="contextLabel" style="margin:8px 0 0;">No semester/subject selected.</p>

        <div style="margin-top:10px;">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="canvas" style="display:none;"></canvas>
          <div class="row">
            <button class="btn-main" id="captureBtn" type="button">Capture from Camera</button>
            <input type="file" id="imageUpload" accept="image/*">
            <button class="btn-soft" id="analyzeImageBtn" type="button">Analyze Image</button>
          </div>
          <div class="row">
            <input type="file" id="videoUpload" accept="video/*">
            <button class="btn-soft" id="analyzeVideoBtn" type="button">Analyze Video</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 style="margin:0;">Class Attendance</h2>
        <div class="stats">
          <div class="stat"><div class="label">Total Records</div><div class="value" id="totalRecords">0</div></div>
          <div class="stat"><div class="label">Today Records</div><div class="value" id="todayRecords">0</div></div>
          <div class="stat"><div class="label">Unique Students</div><div class="value" id="uniqueStudents">0</div></div>
          <div class="stat"><div class="label">Known Faces</div><div class="value" id="knownFaces">0</div></div>
        </div>
        <div class="row">
          <a class="btn-link btn-soft" id="downloadLink" href="/attendance/download">Download CSV</a>
          <button class="btn-danger" id="clearBtn" type="button">Clear Current Class Records</button>
        </div>
        <table>
          <thead><tr><th>Name</th><th>Semester</th><th>Subject</th><th>Timestamp</th></tr></thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </section>
    </div>

    <div class="status" id="status">Faculty panel ready.</div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const semesterEl = document.getElementById("facultySemester");
    const subjectEl = document.getElementById("facultySubject");
    const contextLabel = document.getElementById("contextLabel");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");

    function setStatus(text, isError = false) {
      statusBox.textContent = text;
      statusBox.style.background = isError ? "#fff2f3" : "#f4fbfa";
      statusBox.style.borderColor = isError ? "#ffd7dc" : "#d8e7e4";
      statusBox.style.color = isError ? "#701" : "#124";
    }

    function redirectToLogin() { window.location.href = "/login"; }

    async function send(url, method, payload) {
      const opts = { method };
      if (payload instanceof FormData) {
        opts.body = payload;
      } else if (payload) {
        opts.headers = { "Content-Type": "application/json" };
        opts.body = JSON.stringify(payload);
      }
      const res = await fetch(url, opts);
      if (res.status === 401) { redirectToLogin(); return null; }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function getJson(url) {
      const res = await fetch(url);
      if (res.status === 401) { redirectToLogin(); return null; }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function logout() {
      const out = await send("/logout", "POST", new FormData());
      window.location.href = (out && out.redirect) || "/login";
    }

    async function loadSemesters() {
      const data = await getJson("/api/semesters");
      const semesters = (data && data.semesters) || [];
      semesterEl.innerHTML = semesters.length
        ? semesters.map(s => `<option value='${s.id}'>${s.name}</option>`).join("")
        : "<option value=''>No semesters available</option>";

      if (semesters.length) {
        await loadSubjects(Number(semesterEl.value));
      } else {
        subjectEl.innerHTML = "<option value=''>No subjects available</option>";
      }
    }

    async function loadSubjects(semesterId) {
      const data = await getJson(`/api/subjects?semester_id=${semesterId}`);
      const subjects = (data && data.subjects) || [];
      subjectEl.innerHTML = subjects.length
        ? subjects.map(s => `<option value='${s.id}'>${s.name}</option>`).join("")
        : "<option value=''>No subjects in semester</option>";
    }

    async function refreshContext() {
      const data = await getJson("/api/faculty/context");
      if (!data || !data.context || !data.context.subject_id) {
        contextLabel.textContent = "No semester/subject selected.";
        return null;
      }
      const ctx = data.context;
      contextLabel.textContent = `Active: ${ctx.semester_name} / ${ctx.subject_name}`;
      document.getElementById("downloadLink").href = `/attendance/download?semester_id=${ctx.semester_id}&subject_id=${ctx.subject_id}`;
      return ctx;
    }

    async function ensureContext() {
      const existing = await refreshContext();
      if (existing && existing.subject_id) return existing;

      const semester_id = Number(semesterEl.value);
      const subject_id = Number(subjectEl.value);
      if (!semester_id || !subject_id) return null;

      try {
        const out = await send("/api/faculty/context", "POST", { semester_id, subject_id });
        return out && out.context ? out.context : null;
      } catch (_) {
        return null;
      }
    }

    async function refreshAttendance() {
      const context = await ensureContext();
      if (!context || !context.subject_id) return;
      const q = `?semester_id=${context.semester_id}&subject_id=${context.subject_id}`;
      const [summary, list] = await Promise.all([
        getJson(`/attendance/summary${q}`),
        getJson(`/attendance${q}`)
      ]);

      if (summary) {
        document.getElementById("totalRecords").textContent = summary.total_records;
        document.getElementById("todayRecords").textContent = summary.today_records;
        document.getElementById("uniqueStudents").textContent = summary.unique_students;
        document.getElementById("knownFaces").textContent = summary.known_faces;
      }

      const rows = (list && list.records) || [];
      document.getElementById("recordsBody").innerHTML = rows.length
        ? rows.slice(0, 20).map(r => `<tr><td>${r.name}</td><td>${r.semester_name || "-"}</td><td>${r.subject_name || "-"}</td><td>${r.timestamp}</td></tr>`).join("")
        : "<tr><td colspan='4'>No records yet for this class.</td></tr>";
    }

    async function postRecognition(url, formData) {
      const out = await send(url, "POST", formData);
      if (!out) return;
      const recognized = (out.recognized || []).join(", ") || "none";
      const marked = (out.marked_now || []).join(", ") || "none";
      setStatus(`Recognized: ${recognized} | Newly marked: ${marked}`);
      await refreshAttendance();
    }

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
      } catch (_) {
        setStatus("Camera access denied. Upload image/video instead.", true);
      }
    }

    semesterEl.addEventListener("change", async () => {
      const sem = Number(semesterEl.value);
      if (sem) await loadSubjects(sem);
    });

    document.getElementById("setContextBtn").addEventListener("click", async () => {
      const semester_id = Number(semesterEl.value);
      const subject_id = Number(subjectEl.value);
      if (!semester_id || !subject_id) return setStatus("Select semester and subject first.", true);
      try {
        await send("/api/faculty/context", "POST", { semester_id, subject_id });
        setStatus("Attendance session started.");
        await refreshContext();
        await refreshAttendance();
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("captureBtn").addEventListener("click", () => {
      if (!video.videoWidth) return setStatus("Camera not ready.", true);
      const ctx = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      canvas.toBlob(async (blob) => {
        try {
          const fd = new FormData();
          fd.append("image", blob, "capture.jpg");
          fd.append("source", "camera");
          await postRecognition("/recognize", fd);
        } catch (err) {
          setStatus(err.message, true);
        }
      }, "image/jpeg", 0.9);
    });

    document.getElementById("analyzeImageBtn").addEventListener("click", async () => {
      const file = document.getElementById("imageUpload").files[0];
      if (!file) return setStatus("Select an image first.", true);
      try {
        const fd = new FormData();
        fd.append("image", file);
        fd.append("source", "upload-image");
        await postRecognition("/recognize", fd);
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("analyzeVideoBtn").addEventListener("click", async () => {
      const file = document.getElementById("videoUpload").files[0];
      if (!file) return setStatus("Select a video first.", true);
      try {
        const fd = new FormData();
        fd.append("video", file);
        await postRecognition("/recognize-video", fd);
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("clearBtn").addEventListener("click", async () => {
      if (!confirm("Clear records for the selected class (semester + subject)?")) return;
      const semester_id = Number(semesterEl.value);
      const subject_id = Number(subjectEl.value);
      if (!semester_id || !subject_id) return setStatus("Select semester and subject first.", true);
      try {
        const out = await send("/attendance/clear-current", "POST", { semester_id, subject_id });
        const deleted = (out && out.deleted_records) || 0;
        setStatus(`Cleared ${deleted} record(s) for current class.`);
        await refreshAttendance();
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", logout);
    loadSemesters().then(refreshAttendance);
    initCamera();
  </script>
</body>
</html>
